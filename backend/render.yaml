services:
  - type: web
    name: andatest-api
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync
    startCommand: uv run alembic upgrade head && uv run python seed.py && uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard → use Neon connection string
      - key: SECRET_KEY
        generateValue: true  # Render generates a random secret
      - key: CORS_ORIGINS
        value: "https://andatest-api.onrender.com"
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard — clave del asistente de estudio
